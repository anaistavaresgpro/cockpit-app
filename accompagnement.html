  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Fraunces';\n  font-style: normal;\n  font-weight: 300 700;\n  font-display: swap;\n  src: url(\"2bf043f6-ae82-4721-8689-2d425375d117\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Fraunces';\n  font-style: normal;\n  font-weight: 300 700;\n  font-display: swap;\n  src: url(\"fd45b508-02de-4dde-9baa-a3f7f27607da\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* greek */\n@font-face {\n  font-family: 'Syne';\n  font-style: normal;\n  font-weight: 400 800;\n  font-display: swap;\n  src: url(\"3765db47-3ed4-4e8d-9c62-26f99e9b2c33\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Syne';\n  font-style: normal;\n  font-weight: 400 800;\n  font-display: swap;\n  src: url(\"387e416d-5bf9-495b-9956-e460087d95b2\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Syne';\n  font-style: normal;\n  font-weight: 400 800;\n  font-display: swap;\n  src: url(\"0a54585e-3076-4fd9-a190-3d21e7ae9ab3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ====================================================================\n   Cockpit Resto — Landing\n   Couleurs: #42272B (brun), #5e17eb (violet), #ebded4 (beige)\n   Typos: Fraunces (titres), Syne (interface)\n   ==================================================================== */\n\n:root {\n  --brun: #42272B;\n  --brun-2: #2A1619;\n  --brun-3: #5A3A3F;\n  --violet: #5E17EB;\n  --violet-soft: #7A3DF5;\n  --beige: #EBDED4;\n  --beige-2: #F4ECE3;\n  --ivoire: #FAF6F1;\n  --line-brun: rgba(255, 255, 255, 0.10);\n  --line-beige: rgba(66, 39, 43, 0.12);\n  --muted-on-brun: rgba(255, 245, 235, 0.62);\n  --muted-on-beige: rgba(66, 39, 43, 0.62);\n  --radius-sm: 8px;\n  --radius: 14px;\n  --radius-lg: 22px;\n  --radius-xl: 32px;\n  --shadow-card: 0 1px 0 rgba(255,255,255,0.04) inset, 0 18px 40px -22px rgba(0,0,0,0.45);\n  --shadow-phone: 0 60px 80px -30px rgba(66,39,43,0.45), 0 30px 40px -25px rgba(94,23,235,0.18);\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; }\nbody {\n  font-family: 'Syne', system-ui, sans-serif;\n  font-feature-settings: 'ss01', 'ss02';\n  font-size: 16px;\n  line-height: 1.55;\n  color: var(--brun);\n  background: var(--ivoire);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---------- Typo primitives ---------- */\n.serif { font-family: 'Fraunces', serif; font-feature-settings: 'ss01'; }\nh1, h2, h3, h4 { font-family: 'Fraunces', serif; font-weight: 400; letter-spacing: -0.015em; margin: 0; text-wrap: balance; }\nh1 { font-size: clamp(44px, 6.4vw, 88px); line-height: 0.98; font-variation-settings: 'opsz' 144, 'SOFT' 50; }\nh2 { font-size: clamp(34px, 4.6vw, 64px); line-height: 1.02; font-variation-settings: 'opsz' 144, 'SOFT' 50; }\nh3 { font-size: clamp(22px, 2vw, 28px); line-height: 1.15; font-variation-settings: 'opsz' 60; }\nh4 { font-size: 18px; line-height: 1.25; }\np { margin: 0; text-wrap: pretty; }\n\n.eyebrow {\n  font-family: 'Syne', sans-serif;\n  text-transform: uppercase;\n  letter-spacing: 0.18em;\n  font-size: 11px;\n  font-weight: 600;\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n}\n.eyebrow::before {\n  content: \"\"; width: 24px; height: 1px; background: currentColor; opacity: 0.4;\n}\n.italic { font-style: italic; font-variation-settings: 'opsz' 144, 'SOFT' 100; }\n\n/* ---------- Layout ---------- */\n.section { padding: clamp(80px, 9vw, 140px) 0; }\n.wrap { width: min(1240px, 100% - 48px); margin: 0 auto; }\n.wrap-narrow { width: min(900px, 100% - 48px); margin: 0 auto; }\n\n.on-brun {\n  background: var(--brun);\n  color: var(--beige-2);\n}\n.on-beige { background: var(--beige); color: var(--brun); }\n.on-ivoire { background: var(--ivoire); color: var(--brun); }\n.on-brun-deep { background: var(--brun-2); color: var(--beige-2); }\n\n/* ---------- Buttons ---------- */\n.btn {\n  display: inline-flex; align-items: center; gap: 10px;\n  padding: 14px 22px;\n  border-radius: 999px;\n  font-family: 'Syne', sans-serif;\n  font-weight: 600;\n  font-size: 15px;\n  text-decoration: none;\n  border: 1px solid transparent;\n  cursor: pointer;\n  transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;\n  white-space: nowrap;\n}\n.btn:hover { transform: translateY(-1px); }\n.btn .arrow { transition: transform 0.2s ease; }\n.btn:hover .arrow { transform: translateX(3px); }\n\n.btn-primary { background: var(--violet); color: white; }\n.btn-primary:hover { background: var(--violet-soft); }\n.btn-secondary-light { background: var(--ivoire); color: var(--brun); }\n.btn-secondary-light:hover { background: white; }\n.btn-ghost-light { background: transparent; color: var(--beige-2); border-color: var(--line-brun); }\n.btn-ghost-light:hover { border-color: rgba(255,255,255,0.3); }\n.btn-ghost-dark { background: transparent; color: var(--brun); border-color: var(--line-beige); }\n.btn-ghost-dark:hover { border-color: rgba(66,39,43,0.3); }\n\n/* ---------- NAV ---------- */\n.nav {\n  position: sticky; top: 0; z-index: 50;\n  background: rgba(66, 22, 25, 0.88);\n  backdrop-filter: blur(14px);\n  -webkit-backdrop-filter: blur(14px);\n  border-bottom: 1px solid var(--line-brun);\n  color: var(--beige-2);\n}\n.nav-inner {\n  width: min(1240px, 100% - 48px);\n  margin: 0 auto;\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 14px 0;\n}\n.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; flex-shrink: 0; }\n.brand-mark {\n  width: 28px; height: 28px;\n  display: grid; place-items: center;\n  background: var(--violet);\n  border-radius: 8px;\n  position: relative;\n}\n.brand-mark::before {\n  content: \"\";\n  width: 10px; height: 10px;\n  border: 1.5px solid white;\n  border-radius: 50%;\n}\n.brand-mark::after {\n  content: \"\";\n  position: absolute;\n  width: 3px; height: 3px;\n  background: white; border-radius: 50%;\n}\n.brand-name {\n  font-family: 'Fraunces', serif;\n  font-size: 22px;\n  font-variation-settings: 'opsz' 144;\n  letter-spacing: -0.01em;\n  white-space: nowrap;\n}\n.brand-name em {\n  font-style: italic;\n  font-variation-settings: 'opsz' 144, 'SOFT' 100;\n}\n.nav-links { display: flex; gap: 30px; }\n.nav-links a {\n  color: inherit; text-decoration: none;\n  font-size: 14px; font-weight: 500;\n  opacity: 0.75;\n  transition: opacity 0.15s ease;\n  white-space: nowrap;\n}\n.nav-links a:hover { opacity: 1; }\n.nav-cta { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }\n.nav-cta .btn { padding: 12px 18px; font-size: 14px; }\n.nav-cta .btn-label-short { display: none; }\n@media (max-width: 1180px) {\n  .nav-links { gap: 22px; }\n  .nav-links a { font-size: 13.5px; }\n}\n@media (max-width: 1080px) {\n  .nav-cta .btn-ghost-light { display: none; }\n}\n@media (max-width: 960px) {\n  .nav-cta .btn-label-long { display: none; }\n  .nav-cta .btn-label-short { display: inline; }\n}\n@media (max-width: 860px) {\n  .nav-links { display: none; }\n}\n\n/* ---------- HERO ---------- */\n.hero {\n  position: relative;\n  padding: clamp(60px, 7vw, 100px) 0 clamp(40px, 5vw, 80px);\n  overflow: hidden;\n}\n.hero-grid {\n  display: grid;\n  grid-template-columns: 1.05fr 0.95fr;\n  gap: 60px;\n  align-items: center;\n}\n.hero-left { position: relative; z-index: 2; }\n.hero-eyebrow-row {\n  display: flex; gap: 14px; align-items: center; flex-wrap: wrap;\n  margin-bottom: 28px;\n}\n.pill {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 7px 14px 7px 10px;\n  border-radius: 999px;\n  border: 1px solid var(--line-brun);\n  background: rgba(255,255,255,0.04);\n  font-size: 12px;\n  font-weight: 500;\n  letter-spacing: 0.02em;\n}\n.pill .dot {\n  width: 7px; height: 7px;\n  border-radius: 50%;\n  background: #4ADE80;\n  box-shadow: 0 0 0 3px rgba(74,222,128,0.16);\n}\n.pill-dark {\n  border-color: var(--line-beige);\n  background: rgba(66,39,43,0.04);\n  color: var(--brun);\n}\n.pill-violet {\n  background: rgba(94,23,235,0.12);\n  border-color: rgba(94,23,235,0.25);\n  color: #B9A0FF;\n}\n.pill-light-violet {\n  background: rgba(94,23,235,0.08);\n  border-color: rgba(94,23,235,0.2);\n  color: var(--violet);\n}\n.hero h1 {\n  color: var(--ivoire);\n}\n.hero h1 .accent {\n  color: var(--beige);\n}\n.hero h1 .italic {\n  color: var(--beige);\n}\n.hero-sub {\n  margin-top: 36px;\n  font-size: clamp(16px, 1.3vw, 19px);\n  line-height: 1.55;\n  color: var(--muted-on-brun);\n  max-width: 540px;\n}\n.hero-cta {\n  display: flex; gap: 14px; align-items: center;\n  margin-top: 36px;\n  flex-wrap: wrap;\n}\n.hero-meta {\n  margin-top: 30px;\n  display: flex; gap: 22px; align-items: center; flex-wrap: wrap;\n  font-size: 13px;\n  color: var(--muted-on-brun);\n}\n.hero-meta-item { display: inline-flex; gap: 8px; align-items: center; }\n.check {\n  width: 16px; height: 16px; flex: 0 0 16px;\n  border-radius: 50%;\n  background: rgba(74,222,128,0.16);\n  color: #4ADE80;\n  display: grid; place-items: center;\n}\n.check svg { width: 9px; height: 9px; }\n\n/* Hero centered layout (propulse-style) */\n.hero-grid { grid-template-columns: 1fr; text-align: center; }\n.hero-left { margin: 0 auto; max-width: 920px; }\n.hero-eyebrow-row,\n.hero-cta,\n.hero-meta { justify-content: center; }\n.hero-sub { margin-left: auto; margin-right: auto; }\n.hero-phone-wrap { margin: 80px auto 0; max-width: 880px; }\n.hero-phone-wrap .phone { margin: 0 auto; }\n.hero h1 { font-size: clamp(48px, 7vw, 104px); }\n\n@media (max-width: 960px) {\n  .hero-grid { grid-template-columns: 1fr; gap: 50px; }\n}\n\n/* ---------- Phone Mockup ---------- */\n.hero-phone-wrap {\n  position: relative;\n  display: grid; place-items: center;\n}\n.hero-phone-glow {\n  position: absolute; inset: -10%;\n  background: radial-gradient(closest-side, rgba(94,23,235,0.35), transparent 70%);\n  filter: blur(40px);\n  z-index: 0;\n  pointer-events: none;\n}\n\n.phone {\n  position: relative;\n  width: 320px;\n  aspect-ratio: 9 / 19.5;\n  background: #18090B;\n  border-radius: 44px;\n  padding: 10px;\n  box-shadow: var(--shadow-phone);\n  z-index: 1;\n}\n.phone::after {\n  content: \"\";\n  position: absolute;\n  inset: 4px;\n  border-radius: 40px;\n  border: 1px solid rgba(255,255,255,0.07);\n  pointer-events: none;\n}\n.phone-screen {\n  width: 100%; height: 100%;\n  border-radius: 36px;\n  background: var(--brun-2);\n  overflow: hidden;\n  position: relative;\n  color: var(--beige-2);\n  font-family: 'Syne', sans-serif;\n}\n.phone-notch {\n  position: absolute;\n  top: 8px; left: 50%; transform: translateX(-50%);\n  width: 90px; height: 26px;\n  background: #000;\n  border-radius: 999px;\n  z-index: 4;\n}\n.phone-status {\n  position: relative;\n  z-index: 2;\n  display: flex; justify-content: space-between; align-items: center;\n  padding: 14px 24px 6px;\n  font-size: 11px;\n  font-weight: 600;\n}\n.phone-status-icons { display: flex; gap: 5px; align-items: center; }\n.phone-status-icons span { width: 4px; height: 4px; background: currentColor; border-radius: 50%; }\n.phone-status-icons span:nth-child(1) { height: 6px; border-radius: 1px; width: 4px; }\n.phone-status-icons span:nth-child(2) { height: 8px; border-radius: 1px; width: 4px; }\n.phone-status-icons span:nth-child(3) { height: 10px; border-radius: 1px; width: 4px; }\n.phone-status-icons .battery { width: 16px; height: 8px; border-radius: 2px; border: 1px solid currentColor; padding: 1px; }\n.phone-status-icons .battery::after { content: \"\"; display: block; width: 70%; height: 100%; background: currentColor; border-radius: 1px; }\n\n.phone-app {\n  position: absolute;\n  inset: 36px 0 0;\n  overflow: hidden;\n  padding: 8px 16px 60px;\n}\n.phone-greet {\n  padding: 6px 0 18px;\n  display: flex; justify-content: space-between; align-items: center;\n}\n.phone-greet-text { font-size: 11px; color: var(--muted-on-brun); letter-spacing: 0.02em; }\n.phone-greet-name {\n  font-family: 'Fraunces', serif;\n  font-size: 22px;\n  color: var(--ivoire);\n  font-variation-settings: 'opsz' 144;\n  letter-spacing: -0.01em;\n  margin-top: 2px;\n}\n.phone-avatar {\n  width: 32px; height: 32px;\n  border-radius: 50%;\n  background: linear-gradient(135deg, var(--violet), var(--beige));\n  display: grid; place-items: center;\n  font-size: 11px; font-weight: 700;\n  color: white;\n}\n\n/* Restaurant card inside phone */\n.r-card {\n  background: rgba(255, 245, 235, 0.04);\n  border: 1px solid var(--line-brun);\n  border-radius: 16px;\n  padding: 12px 12px 10px;\n  margin-bottom: 10px;\n}\n.r-card-head {\n  display: flex; justify-content: space-between; align-items: center;\n  margin-bottom: 10px;\n}\n.r-card-name { font-size: 13px; font-weight: 600; color: var(--ivoire); }\n.r-card-loc { font-size: 10px; color: var(--muted-on-brun); margin-top: 1px; }\n.r-card-status {\n  font-size: 9px; padding: 3px 7px; border-radius: 999px;\n  background: rgba(74,222,128,0.12);\n  color: #6EE7A0;\n  font-weight: 600;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n}\n.r-card-status.warn { background: rgba(245, 158, 11, 0.14); color: #FBBF24; }\n.r-card-status.alert { background: rgba(239, 68, 68, 0.14); color: #FCA5A5; }\n\n.r-card-metrics {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  gap: 8px;\n}\n.r-metric { }\n.r-metric-label {\n  font-size: 8px;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  color: var(--muted-on-brun);\n  margin-bottom: 2px;\n}\n.r-metric-value {\n  font-family: 'Fraunces', serif;\n  font-size: 14px;\n  color: var(--ivoire);\n  font-variation-settings: 'opsz' 60;\n}\n.r-metric-trend {\n  font-size: 9px;\n  color: #6EE7A0;\n}\n.r-metric-trend.down { color: #FCA5A5; }\n\n/* Phone alert banner */\n.phone-alert {\n  background: linear-gradient(180deg, rgba(94,23,235,0.16), rgba(94,23,235,0.06));\n  border: 1px solid rgba(94,23,235,0.4);\n  border-radius: 14px;\n  padding: 10px 12px;\n  margin-top: 4px;\n  display: flex; gap: 10px; align-items: flex-start;\n}\n.phone-alert-icon {\n  flex: 0 0 24px; width: 24px; height: 24px;\n  border-radius: 7px;\n  background: rgba(94,23,235,0.32);\n  color: #C4B0FF;\n  display: grid; place-items: center;\n  font-size: 12px;\n}\n.phone-alert-text { font-size: 10.5px; line-height: 1.4; color: var(--ivoire); }\n.phone-alert-text b { color: #C4B0FF; font-weight: 600; }\n\n.phone-tabbar {\n  position: absolute; bottom: 0; left: 0; right: 0;\n  background: rgba(24, 9, 11, 0.95);\n  backdrop-filter: blur(10px);\n  display: flex; justify-content: space-around;\n  padding: 10px 0 14px;\n  border-top: 1px solid var(--line-brun);\n}\n.phone-tabbar-item {\n  display: flex; flex-direction: column; align-items: center; gap: 3px;\n  font-size: 8px; color: var(--muted-on-brun);\n}\n.phone-tabbar-item.active { color: var(--ivoire); }\n.phone-tabbar-icon {\n  width: 18px; height: 18px;\n  border-radius: 5px;\n  background: currentColor;\n  opacity: 0.55;\n}\n.phone-tabbar-item.active .phone-tabbar-icon { opacity: 1; }\n\n/* ---------- Floating side cards next to phone ---------- */\n.hero-float {\n  position: absolute;\n  z-index: 2;\n  background: var(--brun);\n  border: 1px solid var(--line-brun);\n  border-radius: 14px;\n  padding: 12px 14px;\n  box-shadow: 0 24px 40px -20px rgba(0,0,0,0.6);\n  display: flex; gap: 10px; align-items: flex-start;\n  max-width: 240px;\n}\n.hero-float-1 {\n  top: 15%;\n  left: -8%;\n}\n.hero-float-2 {\n  bottom: 12%;\n  right: -6%;\n}\n.hero-float-icon {\n  width: 28px; height: 28px;\n  border-radius: 8px;\n  background: rgba(94,23,235,0.2);\n  display: grid; place-items: center;\n  flex: 0 0 28px;\n  color: #C4B0FF;\n}\n.hero-float-text { font-size: 11px; line-height: 1.35; }\n.hero-float-text b { color: var(--ivoire); font-weight: 600; }\n.hero-float-text span { color: var(--muted-on-brun); }\n.hero-float-time {\n  margin-top: 4px;\n  font-size: 9px;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  color: var(--muted-on-brun);\n}\n@media (max-width: 1100px) {\n  .hero-float { display: none; }\n}\n\n/* ---------- Trust strip ---------- */\n.trust-strip {\n  padding: 32px 0;\n  background: var(--brun-2);\n  color: var(--muted-on-brun);\n  border-top: 1px solid var(--line-brun);\n  border-bottom: 1px solid var(--line-brun);\n  overflow: hidden;\n}\n.trust-track {\n  display: flex; gap: 64px;\n  align-items: center;\n  white-space: nowrap;\n  animation: marquee 40s linear infinite;\n}\n.trust-item {\n  display: inline-flex; gap: 10px; align-items: center;\n  font-family: 'Syne', sans-serif;\n  font-size: 14px;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n  font-weight: 600;\n}\n.trust-item .star {\n  width: 14px; height: 14px;\n  color: var(--violet-soft);\n}\n@keyframes marquee {\n  from { transform: translateX(0); }\n  to { transform: translateX(-50%); }\n}\n\n/* ---------- Problem section (storytelling) ---------- */\n.problem h2 {\n  max-width: 18ch;\n}\n.problem-grid {\n  display: grid;\n  grid-template-columns: 1.2fr 1fr;\n  gap: 80px;\n  align-items: start;\n}\n.problem-quote {\n  font-family: 'Fraunces', serif;\n  font-style: italic;\n  font-size: clamp(28px, 3.4vw, 44px);\n  line-height: 1.18;\n  color: var(--brun);\n  font-variation-settings: 'opsz' 144, 'SOFT' 100;\n  text-wrap: balance;\n}\n.problem-quote::before {\n  content: \"\"\";\n  display: inline-block;\n  color: var(--violet);\n  margin-right: 4px;\n  font-size: 1em;\n}\n.problem-side p {\n  font-size: 17px;\n  color: var(--muted-on-beige);\n  line-height: 1.6;\n}\n.problem-side p + p { margin-top: 16px; }\n.problem-attrib {\n  margin-top: 30px;\n  padding-top: 24px;\n  border-top: 1px solid var(--line-beige);\n  font-size: 13px;\n  color: var(--muted-on-beige);\n  letter-spacing: 0.02em;\n}\n.problem-attrib b { color: var(--brun); font-weight: 600; }\n.problem-attrib em { font-style: italic; }\n@media (max-width: 860px) {\n  .problem-grid { grid-template-columns: 1fr; gap: 40px; }\n}\n\n/* ---------- Section heading ---------- */\n.section-head {\n  display: flex; justify-content: space-between; align-items: end;\n  gap: 40px; margin-bottom: 56px;\n}\n.section-head h2 { max-width: 22ch; }\n.section-head-aside { max-width: 380px; }\n.section-head-aside p {\n  font-size: 15px;\n  line-height: 1.55;\n  opacity: 0.7;\n}\n@media (max-width: 800px) {\n  .section-head { flex-direction: column; align-items: flex-start; margin-bottom: 40px; }\n}\n\n/* ---------- Demo dashboard (laptop-style) ---------- */\n.demo-frame {\n  background: linear-gradient(180deg, rgba(94,23,235,0.06), rgba(94,23,235,0));\n  border: 1px solid var(--line-brun);\n  border-radius: var(--radius-xl);\n  padding: clamp(20px, 3vw, 40px);\n  position: relative;\n  overflow: hidden;\n}\n.demo-window {\n  background: var(--brun-2);\n  border-radius: 18px;\n  border: 1px solid var(--line-brun);\n  box-shadow: 0 30px 60px -30px rgba(0,0,0,0.6);\n  overflow: hidden;\n}\n.demo-titlebar {\n  display: flex; align-items: center; gap: 16px;\n  padding: 12px 18px;\n  border-bottom: 1px solid var(--line-brun);\n  background: rgba(0,0,0,0.18);\n}\n.demo-dots { display: flex; gap: 6px; }\n.demo-dots span { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.15); }\n.demo-url {\n  flex: 1;\n  background: rgba(255,255,255,0.04);\n  border-radius: 7px;\n  padding: 5px 12px;\n  font-size: 11px;\n  color: var(--muted-on-brun);\n  text-align: center;\n}\n.demo-body {\n  display: grid;\n  grid-template-columns: 220px 1fr;\n  min-height: 540px;\n}\n.demo-sidebar {\n  border-right: 1px solid var(--line-brun);\n  padding: 20px 14px;\n  background: rgba(0,0,0,0.16);\n}\n.demo-sidebar-section {\n  margin-bottom: 24px;\n}\n.demo-sidebar-label {\n  font-size: 9px;\n  text-transform: uppercase;\n  letter-spacing: 0.12em;\n  color: var(--muted-on-brun);\n  margin-bottom: 8px;\n  padding-left: 10px;\n}\n.demo-sidebar-item {\n  display: flex; gap: 10px; align-items: center;\n  padding: 7px 10px;\n  border-radius: 8px;\n  font-size: 12.5px;\n  color: var(--beige-2);\n  opacity: 0.75;\n}\n.demo-sidebar-item.active {\n  background: rgba(94,23,235,0.18);\n  color: var(--ivoire);\n  opacity: 1;\n}\n.demo-sidebar-icon {\n  width: 14px; height: 14px;\n  border-radius: 4px;\n  background: currentColor; opacity: 0.55;\n}\n.demo-sidebar-item.active .demo-sidebar-icon { opacity: 1; }\n.demo-main {\n  padding: 24px 28px;\n}\n.demo-main-head {\n  display: flex; justify-content: space-between; align-items: end;\n  margin-bottom: 22px;\n}\n.demo-main-title {\n  font-family: 'Fraunces', serif;\n  font-size: 28px;\n  color: var(--ivoire);\n  font-variation-settings: 'opsz' 144;\n  letter-spacing: -0.01em;\n}\n.demo-main-sub { font-size: 11px; color: var(--muted-on-brun); margin-top: 4px; }\n.demo-period {\n  display: flex; gap: 4px; padding: 4px;\n  background: rgba(0,0,0,0.2);\n  border-radius: 999px;\n  border: 1px solid var(--line-brun);\n}\n.demo-period span {\n  font-size: 10px; padding: 5px 11px;\n  border-radius: : 1px solid var(--line-brun);\n    border-radius: var(--radius-lg);\n    padding: 32px;\n  }\n  .acc-card-title {\n    font-family: 'Fraunces', serif;\n    font-size: 22px;\n    margin-bottom: 18px;\n    color: var(--ivoire);\n  }\n  .acc-card-list { list-style: none; padding: 0; margin: 0; }\n  .acc-card-list li {\n    display: flex; gap: 14px; align-items: flex-start;\n    padding: 10px 0;\n    font-size: 14.5px;\n    color: var(--beige-2);\n    border-bottom: 1px solid var(--line-brun);\n  }\n  .acc-card-list li:last-child { border-bottom: 0; }\n  .acc-card-list li b { color: var(--ivoire); font-weight: 600; }\n  .acc-card-list-num {\n    flex: 0 0 28px;\n    width: 28px; height: 28px;\n    border-radius: 50%;\n    background: var(--violet);\n    color: white;\n    display: grid; place-items: center;\n    font-family: 'Fraunces', serif;\n    font-size: 13px;\n  }\n\n  /* Pas un consultant */\n  .ncs-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 24px;\n  }\n  .ncs-card {\n    border-radius: var(--radius-lg);\n    padding: 36px 32px;\n    min-height: 360px;\n  }\n  .ncs-card.not {\n    background: rgba(66,39,43,0.06);\n    border: 1px dashed var(--line-beige);\n  }\n  .ncs-card.is {\n    background: var(--brun);\n    color: var(--beige-2);\n    position: relative;\n    overflow: hidden;\n  }\n  .ncs-card.is::before {\n    content: \"\";\n    position: absolute;\n    top: -30%; right: -10%;\n    width: 380px; height: 380px;\n    background: radial-gradient(closest-side, rgba(94,23,235,0.35), transparent 70%);\n    pointer-events: none;\n  }\n  .ncs-card h3 {\n    font-size: 26px;\n    margin-bottom: 24px;\n    font-family: 'Fraunces', serif;\n    position: relative;\n  }\n  .ncs-card.is h3 { color: var(--ivoire); }\n  .ncs-card ul { list-style: none; padding: 0; margin: 0; position: relative; }\n  .ncs-card li {\n    padding: 12px 0;\n    font-size: 15px;\n    display: flex; gap: 14px;\n    align-items: flex-start;\n    border-bottom: 1px solid var(--line-beige);\n  }\n  .ncs-card.is li { border-bottom-color: var(--line-brun); }\n  .ncs-card li:last-child { border-bottom: 0; }\n  .ncs-card li::before {\n    content: \"—\";\n    color: var(--muted-on-beige);\n    flex: 0 0 16px;\n  }\n  .ncs-card.is li::before {\n    content: \"→\";\n    color: #C4B0FF;\n  }\n  @media (max-width: 800px) { .ncs-grid { grid-template-columns: 1fr; } }\n\n  /* Process steps */\n  .steps-grid {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 28px;\n  }\n  .step-card {\n    position: relative;\n    padding-top: 36px;\n    border-top: 1px solid var(--line-beige);\n  }\n  .step-card-num {\n    position: absolute;\n    top: -1px;\n    background: var(--beige);\n    padding: 4px 0;\n    font-family: 'Fraunces', serif;\n    font-style: italic;\n    font-size: 13px;\n    color: var(--violet);\n    font-variation-settings: 'opsz' 144, 'SOFT' 100;\n  }\n  .step-card h3 { font-size: 22px; margin-bottom: 10px; }\n  .step-card p {\n    font-size: 14px;\n    color: var(--muted-on-beige);\n    line-height: 1.55;\n  }\n  @media (max-width: 900px) { .steps-grid { grid-template-columns: 1fr 1fr; gap: 36px; } }\n  @media (max-width: 560px) { .steps-grid { grid-template-columns: 1fr; } }\n\n  /* What's included */\n  .inc-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 16px;\n  }\n  .inc-card {\n    background: var(--beige-2);\n    border: 1px solid var(--line-beige);\n    border-radius: var(--radius);\n    padding: 26px 24px;\n  }\n  .inc-icon {\n    display: inline-flex;\n    padding: 10px;\n    background: rgba(94,23,235,0.1);\n    border-radius: 10px;\n    color: var(--violet);\n    margin-bottom: 14px;\n  }\n  .inc-card h3 { font-size: 19px; margin-bottom: 8px; }\n  .inc-card p { font-size: 13.5px; color: var(--muted-on-beige); line-height: 1.5; }\n  @media (max-width: 800px) { .inc-grid { grid-template-columns: 1fr; } }\n\n  /* Big quote */\n  .big-quote {\n    text-align: center;\n    max-width: 920px;\n    margin: 0 auto;\n  }\n  .big-quote-text {\n    font-family: 'Fraunces', serif;\n    font-style: italic;\n    font-size: clamp(28px, 4vw, 48px);\n    line-height: 1.2;\n    color: var(--brun);\n    font-variation-settings: 'opsz' 144, 'SOFT' 100;\n  }\n  .big-quote-attrib {\n    margin-top: 28px;\n    font-size: 14px;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    color: var(--muted-on-beige);\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- NAV -->\n<nav class=\"nav\">\n  <div class=\"nav-inner\">\n    <a href=\"Cockpit Resto — standalone.html\" class=\"brand\">\n      <span class=\"brand-mark\"><\u002Fspan>\n      <span class=\"brand-name\">Cockpit <em>Resto<\u002Fem><\u002Fspan>\n    <\u002Fa>\n    <div class=\"nav-links\">\n      <a href=\"Cockpit Resto — standalone.html#fonctionnement\">Fonctionnement<\u002Fa>\n      <a href=\"Cockpit Resto — standalone.html#modules\">Modules<\u002Fa>\n      <a href=\"Tarifs — standalone.html\">Tarifs<\u002Fa>\n      <a href=\"Accompagnement — standalone.html\" style=\"opacity:1;\">Accompagnement<\u002Fa>\n      <a href=\"Cockpit Resto — standalone.html#faq\">FAQ<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"nav-cta\">\n      <a href=\"Contact — standalone.html\" class=\"btn btn-ghost-light\">Se connecter<\u002Fa>\n      <a href=\"#contact\" class=\"btn btn-primary\">Être rappelé\n        <svg class=\"arrow\" width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<section class=\"acc-hero on-brun\" data-screen-label=\"01 Accomp. hero\">\n  <div class=\"wrap\">\n    <div class=\"acc-hero-grid\">\n      <div>\n        <span class=\"eyebrow\" style=\"color: #C4B0FF;\">Bras droit des restaurateurs<\u002Fspan>\n        <h1 style=\"color: var(--ivoire); margin-top: 22px;\">\n          Pas un consultant.<br>\n          <span class=\"italic\" style=\"color: var(--beige);\">Un binôme.<\u002Fspan>\n        <\u002Fh1>\n        <p class=\"lede\">\n          En plus de l'app, vous pouvez bénéficier d'un accompagnement personnel. Un opérationnel qui a fait le métier, qui s'installe à côté de vous pour mettre vos établissements au carré.\n        <\u002Fp>\n        <div class=\"signature acc-signature\">\n          <div class=\"acc-signature-photo\">SR<\u002Fdiv>\n          <div class=\"acc-signature-text\">\n            <b>Signature Resto<\u002Fb>\n            Restaurateur depuis 12 ans. Accompagnement de chefs-propriétaires.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"acc-card\">\n        <div class=\"acc-card-title\">Ce qu'on couvre, ensemble<\u002Fdiv>\n        <ul class=\"acc-card-list\">\n          <li><span class=\"acc-card-list-num\">1<\u002Fspan><span><b>Audit complet<\u002Fb> de chaque établissement — financier, équipe, opérationnel, réputation.<\u002Fspan><\u002Fli>\n          <li><span class=\"acc-card-list-num\">2<\u002Fspan><span><b>Sessions régulières<\u002Fb> de travail. Tracées dans l'app, dans l'espace « Nos sessions ».<\u002Fspan><\u002Fli>\n          <li><span class=\"acc-card-list-num\">3<\u002Fspan><span><b>Process &amp; recrutements.<\u002Fb> On formalise ce qui tient dans votre tête, on cadre vos managers.<\u002Fspan><\u002Fli>\n          <li><span class=\"acc-card-list-num\">4<\u002Fspan><span><b>Réseau d'experts<\u002Fb> — compta, droit, RH, assureur — mobilisables à la demande.<\u002Fspan><\u002Fli>\n          <li><span class=\"acc-card-list-num\">5<\u002Fspan><span><b>Préparation d'ouverture<\u002Fb> — si vous projetez d'ouvrir un nouvel établissement, on cadre tout en amont.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BIG QUOTE -->\n<section class=\"section on-beige\" data-screen-label=\"02 Citation\">\n  <div class=\"wrap-narrow big-quote\">\n    <p class=\"big-quote-text\">\n      « Je n'arrive pas en disant ce qu'il faut faire. J'arrive en regardant comment ça tourne — vraiment — et on décide ensemble par où commencer. »\n    <\u002Fp>\n    <div class=\"big-quote-attrib\">Signature Resto<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PAS UN CONSULTANT -->\n<section class=\"section on-ivoire\" data-screen-label=\"03 Pas un consultant\">\n  <div class=\"wrap\">\n    <div style=\"text-align:center; margin-bottom:50px;\">\n      <span class=\"eyebrow\" style=\"color: var(--violet);\">Le bon accompagnement<\u002Fspan>\n      <h2 style=\"margin-top:18px; max-width: 22ch; margin-left:auto; margin-right:auto;\">\n        Pas un audit Excel.<br>\n        <span class=\"italic\">Un bras droit en cuisine.<\u002Fspan>\n      <\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"ncs-grid\">\n      <div class=\"ncs-card not\">\n        <h3>Ce que ce n'est <span class=\"italic\" style=\"color: var(--violet); font-family: 'Fraunces', serif;\">pas<\u002Fspan><\u002Fh3>\n        <ul>\n          <li>Un consultant en costume qui débarque avec un PowerPoint.<\u002Fli>\n          <li>Un audit qui finit dans un dossier qu'on ne rouvre jamais.<\u002Fli>\n          <li>Des recommandations génériques pas applicables au quotidien.<\u002Fli>\n          <li>Un forfait avec un nombre de jours rigide.<\u002Fli>\n          <li>Un prix affiché sans qu'on se soit parlé.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"ncs-card is\">\n        <h3>Ce que <span class=\"italic\" style=\"color: var(--beige); font-family: 'Fraunces', serif;\">c'est<\u002Fspan><\u002Fh3>\n        <ul>\n          <li>Quelqu'un qui a fait le métier, qui parle votre langue.<\u002Fli>\n          <li>Du concret : on agit, on mesure, on ajuste.<\u002Fli>\n          <li>Des décisions tracées dans l'app — vous savez où on en est.<\u002Fli>\n          <li>Un rythme adapté à votre saison et à vos besoins.<\u002Fli>\n          <li>Un devis qu'on construit après s'être appelé.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROCESS -->\n<section class=\"section on-beige\" data-screen-label=\"04 Process\">\n  <div class=\"wrap\">\n    <div style=\"text-align:center; margin-bottom:60px;\">\n      <span class=\"eyebrow\" style=\"color: var(--violet);\">Comment on démarre<\u002Fspan>\n      <h2 style=\"margin-top:18px;\">\n        Pas de mystère,<br>\n        <span class=\"italic\">pas de blabla.<\u002Fspan>\n      <\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"steps-grid\">\n      <div class=\"step-card\">\n        <span class=\"step-card-num\">01 — Appel<\u002Fspan>\n        <h3>30 minutes au téléphone<\u002Fh3>\n        <p>Vous me racontez où vous en êtes. Je qualifie si l'accompagnement a du sens — pour vous et pour moi.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step-card\">\n        <span class=\"step-card-num\">02 — Audit<\u002Fspan>\n        <h3>Visite et lecture des chiffres<\u002Fh3>\n        <p>Je viens sur place, je regarde l'app, je discute avec les équipes. Cadrage écrit en sortie.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step-card\">\n        <span class=\"step-card-num\">03 — Plan<\u002Fspan>\n        <h3>Devis sur-mesure<\u002Fh3>\n        <p>Sur la base de l'audit, je propose un rythme et un périmètre. Sans engagement long.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step-card\">\n        <span class=\"step-card-num\">04 — Sessions<\u002Fspan>\n        <h3>On avance, tracé dans l'app<\u002Fh3>\n        <p>Sessions régulières dans « Nos sessions ». Actions, documents, suivi visible des deux côtés.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHAT'S INCLUDED -->\n<section class=\"section on-ivoire\" data-screen-label=\"05 Inclus\">\n  <div class=\"wrap\">\n    <div style=\"text-align:center; margin-bottom:50px;\">\n      <span class=\"eyebrow\" style=\"color: var(--violet);\">Ce qui est inclus<\u002Fspan>\n      <h2 style=\"margin-top:18px;\">\n        Trois angles<br>\n        <span class=\"italic\">d'intervention.<\u002Fspan>\n      <\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"inc-grid\">\n      <article class=\"inc-card\">\n        <div class=\"inc-icon\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 21h18M5 21V10M10 21V6M15 21V13M20 21V8\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Opérations &amp; finances<\u002Fh3>\n        <p>Lecture des chiffres mois après mois, mise au carré des marges, préparation des rendez-vous comptables, anticipation des points durs.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"inc-card\">\n        <div class=\"inc-icon\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"9\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M2 21a7 7 0 0114 0\"><\u002Fpath><circle cx=\"17\" cy=\"10\" r=\"3\"><\u002Fcircle><path d=\"M22 19a5 5 0 00-7-4.5\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Équipe &amp; recrutement<\u002Fh3>\n        <p>Recrutement de managers, formalisation des process, fiches de poste, formation continue, gestion des conflits.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"inc-card\">\n        <div class=\"inc-icon\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 8L13 2L5 8M3 22h18M5 22V11M19 22V11M9 22v-6h6v6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Ouvertures &amp; transmission<\u002Fh3>\n        <p>Préparation de l'ouverture d'un nouvel établissement. Ou inversement : préparation d'une transmission, vente ou retrait progressif.<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CONTACT BLOCK -->\n<section class=\"section on-beige\" id=\"contact\" data-screen-label=\"06 Contact\">\n  <div class=\"wrap\">\n    <div class=\"bd-card\">\n      <div>\n        <span class=\"bd-pill\">Étape suivante<\u002Fspan>\n        <h2>\n          <span class=\"italic\" style=\"color: var(--beige);\">On s'appelle<\u002Fspan><br>\n          30 minutes.\n        <\u002Fh2>\n        <p class=\"lede\">\n          Pas d'engagement, pas de prix avant qu'on ait parlé. Vous me racontez où vous en êtes, je vous dis si je peux vous aider, et comment.\n        <\u002Fp>\n        <ul class=\"bd-list\">\n          <li>Réponse sous 24h ouvrées<\u002Fli>\n          <li>Appel découverte gratuit (30 min)<\u002Fli>\n          <li>Devis transmis dans la semaine si on continue<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <form class=\"bd-form\" onsubmit=\"event.preventDefault(); this.querySelector('button').textContent='Demande envoyée — on se parle bientôt';\">\n        <div class=\"bd-form-title\">Demander à être rappelé<\u002Fdiv>\n        <div class=\"bd-field\">\n          <label>Nom &amp; prénom<\u002Flabel>\n          <input type=\"text\" placeholder=\"Thomas Marquet\" required=\"\">\n        <\u002Fdiv>\n        <div class=\"bd-field\">\n          <label>Téléphone<\u002Flabel>\n          <input type=\"tel\" placeholder=\"06 12 34 56 78\" required=\"\">\n        <\u002Fdiv>\n        <div class=\"bd-field\">\n          <label>Email<\u002Flabel>\n          <input type=\"email\" placeholder=\"thomas@maison.fr\">\n        <\u002Fdiv>\n        <div class=\"bd-field\">\n          <label>Combien d'établissements ?<\u002Flabel>\n          <select>\n            <option>1 établissement<\u002Foption>\n            <option>2 établissements<\u002Foption>\n            <option>3 ou plus<\u002Foption>\n            <option>En projet d'ouverture<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"bd-field\">\n          <label>En quelques mots<\u002Flabel>\n          <textarea placeholder=\"Où vous en êtes, ce que vous cherchez à régler\"><\u002Ftextarea>\n        <\u002Fdiv>\n        <button type=\"submit\" class=\"btn btn-primary\" style=\"width:100%;\">Demander un rappel<\u002Fbutton>\n        <p style=\"font-size: 11px; color: var(--muted-on-brun); margin-top: 12px; text-align:center;\">Vos coordonnées ne servent qu'à vous rappeler.<\u002Fp>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer class=\"footer\">\n  <div class=\"wrap\">\n    <div class=\"footer-inner\">\n      <div class=\"footer-brand\">\n        <a href=\"Cockpit Resto — standalone.html\" class=\"brand\" style=\"color: var(--ivoire);\">\n          <span class=\"brand-mark\"><\u002Fspan>\n          <span class=\"brand-name\">Cockpit <em>Resto<\u002Fem><\u002Fspan>\n        <\u002Fa>\n        <p>Édité par Signature Resto. Conçu par un restaurateur pour les restaurateurs.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <h4>Produit<\u002Fh4>\n        <a href=\"Cockpit Resto — standalone.html#fonctionnement\">Fonctionnement<\u002Fa>\n        <a href=\"Cockpit Resto — standalone.html#modules\">Modules<\u002Fa>\n        <a href=\"Cockpit Resto — standalone.html#marque-blanche\">Marque blanche<\u002Fa>\n        <a href=\"Tarifs — standalone.html\">Tarifs<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <h4>Compagnie<\u002Fh4>\n        <a href=\"Accompagnement — standalone.html\">Accompagnement<\u002Fa>\n        <a href=\"Contact — standalone.html\">Contact<\u002Fa>\n        <a href=\"Cockpit Resto — standalone.html#faq\">FAQ<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <h4>Légal<\u002Fh4>\n        <a href=\"#\">Mentions légales<\u002Fa>\n        <a href=\"#\">CGU<\u002Fa>\n        <a href=\"#\">Politique de confidentialité<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer-bottom\">\n      <span>© 2026 Signature Resto — Tous droits réservés<\u002Fspan>\n      <span>Hébergement France · RGPD compliant<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
